<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Our Memories - Ntando & You</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <!-- Navigation -->
    <nav class="navbar">
        <div class="container">
            <div class="logo">💕 Our Story</div>
            <ul class="nav-links">
                <li><a href="index.html">Home</a></li>
                <li><a href="index.html#about">About Us</a></li>
                <li><a href="memories.html">Our Memories</a></li>
            </ul>
        </div>
    </nav>

    <!-- Memories Section -->
    <section class="memories-page">
        <div class="container">
            <h1 class="memories-title">Our Beautiful Memories</h1>
            <p class="memories-subtitle">Click any photo to view it in full size</p>
            
            <!-- Collage Grid -->
            <div class="collage-container" id="collage-container">
                <!-- Collage items will be populated here by JavaScript -->
            </div>
        </div>
    </section>

    <!-- Lightbox Modal -->
    <div id="lightbox" class="lightbox">
        <span class="close">&times;</span>
        <img class="lightbox-content" id="lightbox-img">
        <div id="lightbox-caption"></div>
        <button class="prev">❮</button>
        <button class="next">❯</button>
    </div>

    <!-- Footer -->
    <footer class="footer">
        <div class="container">
            <p>Made with 💕 for us</p>
        </div>
    </footer>

    <script src="script.js"></script>
    <script>
        // Initialize collage on memories page
        function populateMemoriesCollage() {
            const collageContainer = document.getElementById('collage-container');
            const lightbox = document.getElementById('lightbox');
            const lightboxImg = document.getElementById('lightbox-img');
            const lightboxCaption = document.getElementById('lightbox-caption');
            const closeBtn = document.querySelector('.close');
            const prevBtn = document.querySelector('.prev');
            const nextBtn = document.querySelector('.next');

            let currentImageIndex = 0;
            let images = [];
            let photoFiles = [];

            const GITHUB_REPO_OWNER = 'Sakura7274';
            const GITHUB_REPO_NAME = 'Esethu-x-Ntando';
            const GITHUB_PHOTOS_API = `https://api.github.com/repos/${GITHUB_REPO_OWNER}/${GITHUB_REPO_NAME}/contents/photos`;
            const supportedPhotoExtensions = ['jpg', 'jpeg', 'png', 'webp', 'svg'];

      // Manually configure the exact order of photos here.
const manualPhotoOrder = [
    'photo1.jpg',
    'photo4.jpg',
    'photo2.jpg',
    'photo6.jpg',
    'photo7.jpg',
    'photo3.jpg',
    'photo8.jpg',
    'photo9.jpg',
    'photo10.jpg',
    'photo11.jpg',
    'photo12.jpg',
    'photo13.jpg',
    'photo14.jpg',
    'photo5.jpg',
    'photo15.jpg',
    'photo16.jpg',
    'photo17.jpg',
    'photo18.jpg',
    'photo19.jpg',
    'photo20.jpg',
    'photo21.jpg',
    'photo22.jpg',
    'photo23.jpg',
    'photo24.jpg',
    'photo25.jpg',
    'photo26.jpg',
    'photo27.jpg',
    'photo28.jpg',
    'photo29.jpg'
];

// Direct focus map for precise cropping control.
// Use exact filename keys and any valid CSS object-position value.
const focusMap = {
    'photo1.jpg': '50% 0%',
    'photo21.jpg': '50% 63%',
    'photo29.jpg': '50% 81%',
    'photo18.jpg': '50% 40%',
    'photo23.jpg': '50% 40%',
    'photo26.jpg': '50% 40%',
    'photo15.jpg': '50% 40%',
};

// Zoom levels for photos (100 = normal size, <100 = zoom out, >100 = zoom in)
const zoomMap = {
    'photo2.jpg': 104,
    'photo7.jpg': 107,
    'photo5.jpg': 97
};

// Size/orientation for each photo (size-1 = normal, size-2 = wide, size-3 = tall)
const sizeMap = {
    'photo4.jpg': 'size-3',
    'photo2.jpg': 'size-3',
    'photo7.jpg': 'size-3',
    'photo3.jpg': 'size-3',
    'photo8.jpg': 'size-3',
    'photo12.jpg': 'size-3',
    'photo13.jpg': 'size-3',
    'photo5.jpg': 'size-3',
    'photo15.jpg': 'size-2',
    'photo16.jpg': 'size-3',
    'photo18.jpg': 'size-2',
    'photo20.jpg': 'size-3',
    'photo21.jpg': 'size-2',
    'photo23.jpg': 'size-2',
    'photo24.jpg': 'size-3',
    'photo26.jpg': 'size-2',
    'photo28.jpg': 'size-3',
    'photo29.jpg': 'size-2',
    'photo10.jpg': 'size-1',
};

            const normalizedFocusMap = Object.fromEntries(
                Object.entries(focusMap).map(([key, value]) => [key.toLowerCase(), value])
            );

            const normalizedZoomMap = Object.fromEntries(
                Object.entries(zoomMap).map(([key, value]) => [key.toLowerCase(), value])
            );

            const normalizedSizeMap = Object.fromEntries(
                Object.entries(sizeMap).map(([key, value]) => [key.toLowerCase(), value])
            );

            const fallbackFocusPositions = [
                'center',      // default center focus
                'top',         // focus on top of photo
                'bottom',      // focus on bottom of photo
                'left',        // focus on left side
                'right',       // focus on right side
                '20% 80%',     // focus on bottom-left area
                '80% 20%',     // focus on top-right area
                'center top'   // focus on center-top
            ];

            function getManualOrder() {
                return manualPhotoOrder.map(name => name.toLowerCase());
            }

            function applyManualOrder(files) {
                const order = getManualOrder();
                if (!order.length) return files;

                const remaining = [...files];
                const ordered = [];

                order.forEach(name => {
                    const index = remaining.findIndex(file => file.name.toLowerCase() === name);
                    if (index !== -1) {
                        ordered.push(remaining.splice(index, 1)[0]);
                    }
                });

                return ordered.concat(remaining);
            }

            function renderCollage(files) {
                collageContainer.innerHTML = '';
                images = files.map(file => ({
                    src: file.download_url,
                    caption: file.name
                }));

                files.forEach((file, index) => {
                    const collageItem = document.createElement('div');
                    collageItem.className = 'collage-item';
                    
                    const fileName = file.name.toLowerCase();
                    const customSize = normalizedSizeMap[fileName];
                    const sizeClass = customSize || ['size-1', 'size-2', 'size-1', 'size-3', 'size-2', 'size-1', 'size-2', 'size-3'][index % 8];
                    collageItem.classList.add(sizeClass);

                    let focusPosition = normalizedFocusMap[fileName] || null;
                    let zoomLevel = normalizedZoomMap[fileName] || 100;

                    if (!focusPosition) {
                        if (fileName.includes('focus_top') || fileName.includes('_top')) {
                            focusPosition = 'top';
                        } else if (fileName.includes('focus_bottom') || fileName.includes('_bottom')) {
                            focusPosition = 'bottom';
                        } else if (fileName.includes('focus_left') || fileName.includes('_left')) {
                            focusPosition = 'left';
                        } else if (fileName.includes('focus_right') || fileName.includes('_right')) {
                            focusPosition = 'right';
                        } else if (fileName.includes('focus_center') || fileName.includes('_center')) {
                            focusPosition = 'center';
                        } else {
                            focusPosition = fallbackFocusPositions[index % fallbackFocusPositions.length];
                        }
                    }

                    if (!focusPosition) {
                        focusPosition = 'center';
                    }

                    // Use background-image approach for better zoom control
                    collageItem.style.backgroundImage = `url(${file.download_url})`;
                    collageItem.style.backgroundPosition = focusPosition;
                    collageItem.style.backgroundSize = zoomLevel <= 100 ? 'cover' : `${zoomLevel}%`;
                    collageItem.style.backgroundRepeat = 'no-repeat';
                    collageItem.style.backgroundColor = '#000';
                    
                    // Add title for accessibility
                    collageItem.title = file.name;
                    collageItem.onclick = function(e) {
                        e.stopPropagation();
                        currentImageIndex = index;
                        showLightbox();
                    };

                    collageContainer.appendChild(collageItem);
                });
            }

            function showLightbox() {
                lightbox.classList.add('active');
                lightboxImg.src = images[currentImageIndex].src;
                lightboxCaption.textContent = images[currentImageIndex].caption;
                document.body.style.overflow = 'hidden';
            }

            function closeLightbox() {
                lightbox.classList.remove('active');
                document.body.style.overflow = 'auto';
            }

            function nextImage() {
                currentImageIndex = (currentImageIndex + 1) % images.length;
                showLightbox();
            }

            function prevImage() {
                currentImageIndex = (currentImageIndex - 1 + images.length) % images.length;
                showLightbox();
            }

            fetch(GITHUB_PHOTOS_API)
                .then(response => {
                    if (!response.ok) {
                        throw new Error('Unable to fetch photos from GitHub.');
                    }
                    return response.json();
                })
                .then(files => {
                    let photoFiles = files.filter(file => 
                        file.type === 'file' && 
                        supportedPhotoExtensions.some(ext => file.name.toLowerCase().endsWith(ext))
                    );

                    // Keep photo order stable by sorting deterministically by filename
                    photoFiles.sort((a, b) => a.name.localeCompare(b.name, undefined, { numeric: true, sensitivity: 'base' }));

                    if (photoFiles.length === 0) {
                        collageContainer.innerHTML = '<p>No photos found yet.</p>';
                        return;
                    }

                    const orderedPhotoFiles = applyManualOrder(photoFiles);
                    images = orderedPhotoFiles.map(file => ({
                        src: file.download_url,
                        caption: file.name
                    }));

                    renderCollage(orderedPhotoFiles);

                    closeBtn.addEventListener('click', closeLightbox);
                    nextBtn.addEventListener('click', nextImage);
                    prevBtn.addEventListener('click', prevImage);

                    lightbox.addEventListener('click', function(e) {
                        if (e.target === lightbox) {
                            closeLightbox();
                        }
                    });

                    document.addEventListener('keydown', function(e) {
                        if (!lightbox.classList.contains('active')) return;
                        
                        switch(e.key) {
                            case 'ArrowRight':
                                nextImage();
                                break;
                            case 'ArrowLeft':
                                prevImage();
                                break;
                            case 'Escape':
                                closeLightbox();
                                break;
                        }
                    });
                })
                .catch(error => {
                    console.error('Error loading photos:', error);
                    collageContainer.innerHTML = '<p>Error loading photos. Please try again later.</p>';
                });
        }

        // Initialize on page load
        document.addEventListener('DOMContentLoaded', populateMemoriesCollage);
    </script>
</body>
</html>
